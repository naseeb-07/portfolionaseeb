<!DOCTYPE html>
<html lang="en" class="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Mohammed Naseeb</title>
    <link href="dist/output.css?v=3" rel="stylesheet">
</head>

<body class="font-sans flex flex-col min-h-screen relative justify-center items-center">

    <div id="canvas-container" class="fixed inset-0 -z-10 w-full h-full pointer-events-none"></div>

    <main class="w-full max-w-md px-6">
        <div class="glass p-8 rounded-3xl text-center">
            <h1 class="text-3xl font-bold mb-8 text-primary">Admin Access</h1>
            <form id="loginForm" class="space-y-6 text-left">
                <div>
                    <label class="block mb-2 font-medium ml-1">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                        class="w-full p-4 rounded-xl glass outline-none focus:ring-2 focus:ring-primary/50 transition bg-white/5">
                </div>

                <button type="submit"
                    class="bg-primary hover:bg-sky-600 text-white font-bold px-8 py-4 rounded-xl w-full transition shadow-lg hover:shadow-primary/30">
                    Login
                </button>
                <p id="loginStatus" class="text-center font-medium mt-4 text-red-400"></p>
            </form>
            <div class="mt-6">
                <a href="index.html" class="text-sm opacity-70 hover:opacity-100 hover:underline">Back to Home</a>
            </div>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>

</html>
